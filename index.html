<!DOCTYPE html>
<html lang="ru">
<head>
    <title>ЛАСТОЧКА</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Тот же CSS в стиле 2010-х, адаптированный под мобилки */
        body { background-color: #ECE9D8; font-family: Tahoma, Arial, sans-serif; font-size: 14px; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        h1 { color: #2D5082; font-size: 20px; margin: 10px; text-shadow: 1px 1px #fff; text-align: center; }
        #auth-box, #main-ui { background: #F4F4F4; flex: 1; display: flex; flex-direction: column; padding: 15px; }
        .card { border: 1px solid #7EA4D0; background: #fff; padding: 15px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        button { background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%); border: 1px solid #707070; border-radius: 3px; padding: 10px; cursor: pointer; font-weight: bold; }
        input { border: 1px solid #7EA4D0; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; font-size: 16px; }
        #messages-list { background: white; border: 1px solid #7EA4D0; flex: 1; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .msg-line { margin: 5px 0; padding-bottom: 3px; border-bottom: 1px dotted #ccc; }
        .sender-me { color: #0000FF; font-weight: bold; }
        .sender-he { color: #FF0000; font-weight: bold; }
        .bottom-controls { display: flex; gap: 5px; background: #eee; padding: 5px; border-top: 1px solid #ccc; }
        hr { border: 0; border-top: 1px solid #7EA4D0; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>ЛАСТОЧКА Mobile</h1>

    <div id="auth-box">
        <div class="card">
            <strong>Вход в систему</strong>
            <input type="number" id="my-id-input" placeholder="Ваш ID (напр. 555)">
            <input type="password" id="my-pass-input" placeholder="Ваш пароль">
            
            <div style="display:flex; gap: 10px; margin-top: 10px;">
                <button onclick="handleAuth('login')" style="flex: 1;">ВОЙТИ</button>
                <button onclick="handleAuth('reg')" style="flex: 1; color: #555;">РЕГИСТРАЦИЯ</button>
            </div>
            <p style="font-size: 10px; color: #666; margin-top: 10px;">* Если вы заходите впервые, сначала нажмите "Регистрация"</p>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <span>ID: <b id="display-id" style="color: #2D5082;"></b></span>
            <button onclick="location.reload()" style="padding: 3px 8px;">Выход</button>
        </div>
        <hr>

        <div id="chat-selector">
            <strong>Кому написать:</strong>
            <input type="number" id="target-id-input" placeholder="ID собеседника">
            <button onclick="startChat()" style="width:100%; margin-top: 5px;">ОТКРЫТЬ ДИАЛОГ</button>
        </div>

        <div id="chat-window" style="display:none; flex: 1; flex-direction: column; margin-top:10px;">
            <div style="background: #7EA4D0; color: white; padding: 5px; font-size: 12px; font-weight: bold;" id="chat-title"></div>
            <div id="messages-list"></div>
            <div class="bottom-controls">
                <input type="text" id="msg-input" placeholder="Сообщение..." style="flex: 1;">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://xjekyaiyfvtjtkinlmbv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Nne-WFtskhN6oEkYkgtWhA_KHo2W8YC'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myId, targetId, currentChatId;

        // Обработка входа и регистрации
        async function handleAuth(mode) {
            const id = document.getElementById('my-id-input').value;
            const pass = document.getElementById('my-pass-input').value;
            if (!id || !pass) return alert("Введите и ID, и пароль!");

            if (mode === 'reg') {
                // Пытаемся создать пользователя
                const { error } = await _supabase.from('users').insert([{ id_number: id, password: pass }]);
                if (error) {
                    alert("Ошибка: этот ID уже занят или база недоступна.");
                } else {
                    alert("Регистрация завершена! Теперь нажмите 'Войти'.");
                }
            } else {
                // Проверяем пароль
                const { data, error } = await _supabase
                    .from('users')
                    .select('*')
                    .eq('id_number', id)
                    .eq('password', pass)
                    .single();

                if (data) {
                    myId = id;
                    document.getElementById('auth-box').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'flex';
                    document.getElementById('display-id').innerText = myId;
                } else {
                    alert("Неверный пароль или ID не существует.");
                }
            }
        }

        async function startChat() {
            targetId = document.getElementById('target-id-input').value;
            if (!targetId || targetId === myId) return alert("Введите ID собеседника");

            currentChatId = [myId, targetId].sort().join("_");
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-title').innerText = "Диалог с [" + targetId + "]";
            loadMessages();
            subscribe();
        }

        async function loadMessages() {
            const { data } = await _supabase.from('messages').select('*').eq('chat_id', currentChatId).order('created_at', { ascending: true });
            if (data) {
                const list = document.getElementById('messages-list');
                list.innerHTML = data.map(m => {
                    const isMe = m.sender_id == myId;
                    return `<div class="msg-line"><span class="${isMe ? 'sender-me' : 'sender-he'}">${isMe ? 'Вы' : 'ID '+m.sender_id}:</span> ${m.text}</div>`;
                }).join('');
                list.scrollTop = list.scrollHeight;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value;
            if (!text) return;
            input.value = '';
            await _supabase.from('messages').insert([{ sender_id: myId, receiver_id: targetId, text: text, chat_id: currentChatId }]);
            loadMessages();
        }

        function subscribe() {
            _supabase.channel('room1').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${currentChatId}` }, () => loadMessages()).subscribe();
        }

        // Отправка по Enter
        document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
