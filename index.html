<!DOCTYPE html>
<html lang="ru">
<head>
    <title>ЛАСТОЧКА</title>
    <meta charset="UTF-8">
    <style>
        /* СТИЛЬ 2010-х */
        body {
            background-color: #ECE9D8; /* Классический цвет Windows XP/7 */
            font-family: Tahoma, Arial, sans-serif;
            font-size: 12px;
            margin: 20px;
        }

        h1 {
            color: #2D5082;
            font-size: 24px;
            margin-bottom: 5px;
            text-shadow: 1px 1px #fff;
        }

        #auth-box, #main-ui {
            background: #F4F4F4;
            border: 1px solid #7EA4D0;
            padding: 15px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            max-width: 500px;
        }

        button {
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
            border: 1px solid #707070;
            border-radius: 3px;
            padding: 3px 10px;
            cursor: pointer;
            font-size: 12px;
        }

        button:hover {
            background: linear-gradient(to bottom, #e0e0e0 0%, #ffffff 100%);
            border-color: #3C7FB1;
        }

        input {
            border: 1px solid #7EA4D0;
            padding: 3px;
            border-radius: 2px;
        }

        #messages-list {
            background: white;
            border: 1px solid #7EA4D0;
            height: 300px;
            overflow-y: scroll;
            padding: 10px;
            margin-top: 10px;
        }

        .msg-line {
            margin: 4px 0;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 2px;
        }

        .sender-me { color: #0000FF; font-weight: bold; }
        .sender-he { color: #FF0000; font-weight: bold; }

        #chat-window {
            margin-top: 15px;
        }

        hr { border: 0; border-top: 1px solid #7EA4D0; }
    </style>
</head>
<body>

    <h1>ЛАСТОЧКА</h1>
    <hr>

    <div id="auth-box">
        <strong>Вход в мессенджер</strong>
        <p>Ваш случайный ID: <b id="generated-id" style="color: green; font-size: 16px;"></b></p>
        <button onclick="login()">Подключиться</button>
    </div>

    <div id="main-ui" style="display:none;">
        <div>
            Статус: <span style="color: green;">● В сети</span> | 
            Ваш ID: <b id="display-id"></b> 
            <button onclick="location.reload()" style="margin-left: 10px;">Выйти</button>
        </div>
        <hr>

        <strong>Найти собеседника:</strong><br>
        <input type="number" id="target-id-input" placeholder="Введите ID">
        <button onclick="startChat()">Добавить/Чат</button>

        <div id="chat-window" style="display:none;">
            <div style="background: #7EA4D0; color: white; padding: 5px; font-weight: bold;" id="chat-title"></div>
            <div id="messages-list"></div>
            <div style="margin-top: 10px;">
                <input type="text" id="msg-input" style="width: 75%;" placeholder="Напишите сообщение...">
                <button onclick="sendMessage()">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://xjekyaiyfvtjtkinlmbv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Nne-WFtskhN6oEkYkgtWhA_KHo2W8YC'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myId, targetId, currentChatId;

        const randomID = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('generated-id').innerText = randomID;

        function login() {
            myId = randomID.toString();
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('display-id').innerText = myId;
        }

        async function startChat() {
            targetId = document.getElementById('target-id-input').value;
            if (!targetId || targetId === myId) return alert("Введите ID собеседника");

            currentChatId = [myId, targetId].sort().join("_");
            
            document.getElementById('chat-window').style.display = 'block';
            document.getElementById('chat-title').innerText = "Диалог с пользователем [" + targetId + "]";
            
            loadMessages();
            subscribeToMessages();
        }

        async function loadMessages() {
            const { data, error } = await _supabase
                .from('messages')
                .select('*')
                .eq('chat_id', currentChatId)
                .order('created_at', { ascending: true });

            if (!error) renderMessages(data);
        }

        function renderMessages(messages) {
            const list = document.getElementById('messages-list');
            list.innerHTML = '';
            messages.forEach(m => {
                const isMe = m.sender_id === myId;
                const senderClass = isMe ? "sender-me" : "sender-he";
                const senderName = isMe ? "Вы" : "Собеседник";
                
                list.innerHTML += `
                    <div class="msg-line">
                        <span class="${senderClass}">${senderName}:</span> ${m.text}
                    </div>`;
            });
            list.scrollTop = list.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value;
            if (!text) return;

            input.value = '';

            const { error } = await _supabase
                .from('messages')
                .insert([{ 
                    sender_id: myId, 
                    receiver_id: targetId, 
                    text: text, 
                    chat_id: currentChatId 
                }]);

            if (error) {
                alert("Ошибка! Проверьте SQL-политики в Supabase.");
            } else {
                loadMessages(); 
            }
        }

        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function subscribeToMessages() {
            _supabase
                .channel('chat_v1')
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'messages', 
                    filter: `chat_id=eq.${currentChatId}` 
                }, payload => {
                    loadMessages();
                })
                .subscribe();
        }
    </script>
</body>
</html>
